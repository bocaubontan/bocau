<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Mua Chim Bồ Câu - Trại Chim Bổn Tân</title>
</head>
<body style="background-color: #faf9f6; margin: 0; padding: 0; font-family: Arial, sans-serif;">

    <nav style="text-align: center; padding: 15px 5px; background-color: #f1f5f9; border-radius: 8px; margin: 10px auto; max-width: 95%;">
        <a href="index.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Trang chủ</a>
        <a href="gioithieu.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Giới thiệu</a>
        <a href="giachim.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Giá chim</a>
        <a href="hinhanh.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Hình ảnh</a>
        <a href="tintuc.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Tin tức</a>
        <a href="datmua.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Đặt mua</a>
        <a href="lienhe.html" style="margin: 5px 8px; text-decoration: none; color: blue; font-size: 16px; display: inline-block; font-weight: bold;">Liên hệ</a>
    </nav>

    <div style="max-width: 600px; margin: 20px auto; background-color: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        
        <h2 style="color: #0044cc; font-size: 20px; margin-top: 10px; margin-bottom: 20px;">🛒 ĐẶT MUA CHIM BỒ CÂU TRỰC TUYẾN</h2>

        <form action="https://formspree.io/f/mqevnope">
            
            <p style="margin-bottom: 5px; font-weight: bold; color: #333;">Họ và tên người đặt mua:</p>
            <input type="text" name="hoten" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px;">

            <p style="margin-bottom: 5px; font-weight: bold; color: #333;">Số điện thoại liên hệ:</p>
            <input type="tel" name="sodienthoai" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px;">

            <p style="margin-bottom: 5px; font-weight: bold; color: #333;">Loại bồ câu muốn đặt mua:</p>
            <select name="loaichim" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background-color: #fff;">
                <option value="Bồ câu Pháp Sinh Sản (400.000đ/cặp)">Bồ câu Pháp Sinh Sản (400.000đ/cặp)</option>
                <option value="Bồ câu Pháp Hậu Bị (250.000đ/cặp)">Bồ câu Pháp Hậu Bị (250.000đ/cặp)</option>
                <option value="Bồ câu Pháp Chim Ra Ràng (120.000đ/cặp)">Bồ câu Pháp Chim Ra Ràng (100.000đ/cặp)</option>
                <option value="Loại khác / Yêu cầu riêng">Loại khác / Yêu cầu riêng</option>
            </select>

            <p style="margin-bottom: 5px; font-weight: bold; color: #333;">Số lượng đặt mua hoặc Yêu cầu cụ thể:</p>
            <textarea name="soluong_yeucau" rows="4" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; font-family: Arial, sans-serif;"></textarea>

            <button type="submit" style="width: 100%; background-color: #ff3b00; color: white; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase;">
                🚀 BẤM VÀO ĐÂY ĐỂ GỬI ĐƠN ĐẶT HÀNG
            </button>
            
        </form>
    </div>

</body>
</html>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var nutGui = this.querySelector('button');
    nutGui.innerText = "⏳ Đang gửi đơn hàng...";
    nutGui.disabled = true;

    var formData = new FormData(this);

    fetch("https://formspree.io/f/mqevnope", {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    }).then(function(response) {
        if (response.ok) {
            // Gửi thành công, chuyển về trang camon.html tiếng Việt của chú
            window.location.href = "camon.html";
        } else {
            alert("Có lỗi xảy ra, chú vui lòng kiểm tra lại kết nối mạng!");
            nutGui.innerText = "🚀 BẤM VÀO ĐÂY ĐỂ GỬI ĐƠN ĐẶT HÀNG";
            nutGui.disabled = false;
        }
    }).catch(function(error) {
        alert("Có lỗi xảy ra, chú vui lòng thử lại sau!");
        nutGui.innerText = "🚀 BẤM VÀO ĐÂY ĐỂ GỬI ĐƠN ĐẶT HÀNG";
        nutGui.disabled = false;
    });
});
</script>
